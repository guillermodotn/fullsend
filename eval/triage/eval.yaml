name: triage-eval
description: Functional test of the fullsend triage agent pipeline

skill: triage

execution:
  mode: case
  timeout: 900  # 15 min — agent timeout is 10 min, plus setup/teardown
  parallelism: 4
  env:
    EVAL_ORG: $EVAL_ORG
    GH_TOKEN: $GH_TOKEN
    FULLSEND_DIR: $FULLSEND_DIR
    GOOGLE_APPLICATION_CREDENTIALS: $GOOGLE_APPLICATION_CREDENTIALS
    ANTHROPIC_VERTEX_PROJECT_ID: $ANTHROPIC_VERTEX_PROJECT_ID
    GOOGLE_CLOUD_PROJECT: $GOOGLE_CLOUD_PROJECT
    CLOUD_ML_REGION: $CLOUD_ML_REGION

hooks:
  before_each:
    - command: "setup-fixture.sh"
      timeout: 120
      description: "Create ephemeral repo and fixture"

  after_each:
    - command: "capture-fixture.sh"
      timeout: 30
      description: "Capture fixture state for judges"
    - command: "teardown-fixture.sh"
      timeout: 30
      on_failure: continue
      description: "Delete ephemeral repo"

runner:
  type: cli
  command:
    - "run-fullsend.sh"
    - "{agent}"
    - "{workspace}"
    - "{output_dir}"
  env:
    FULLSEND_DIR: $FULLSEND_DIR
    GH_TOKEN: $GH_TOKEN
    GOOGLE_APPLICATION_CREDENTIALS: $GOOGLE_APPLICATION_CREDENTIALS
    ANTHROPIC_VERTEX_PROJECT_ID: $ANTHROPIC_VERTEX_PROJECT_ID
    GOOGLE_CLOUD_PROJECT: $GOOGLE_CLOUD_PROJECT
    CLOUD_ML_REGION: $CLOUD_ML_REGION

models:
  skill: claude-opus-4-6
  judge: claude-opus-4-6

dataset:
  path: cases
  schema: |
    Each case directory contains:
    - input.yaml: Fixture definition with forge, fixture type, title, and body.
    - annotations.yaml: Expected fixture state (labels, comments, state).
    - repo/: Directory (or symlink) with the git repo contents the agent sees.

outputs:
  - path: output
    schema: |
      fixture-state.json: Captured state of the GitHub issue/PR after the
      full agent pipeline (pre-script, agent, post-script) has run.
      Contains: state, labels, comments, assignees, and for PRs: reviews.

# ---------------------------------------------------------------------------
# Judges
# ---------------------------------------------------------------------------
judges:
  - name: triage_quality
    description: |
      Evaluate the overall quality of the triage — not just whether labels
      were applied, but whether the agent's comment demonstrates understanding
      of the issue and provides actionable guidance.
    prompt: |
      You are evaluating a triage agent's work on a GitHub issue.

      The agent was given an issue filed against a repo, and ran a full
      triage pipeline: it read the source code, analyzed the issue, posted
      a comment, and applied labels.

      Here is the captured state of the issue after the agent ran:
      {{ outputs }}

      Here is what the test case author expects from a good triage of this
      specific issue, including what the agent should have noticed in the
      source code:
      {{ annotations }}

      Evaluate the quality of the triage on a 1-5 scale:

      1 = Wrong action or fundamentally misunderstood the issue
      2 = Correct action but missed key observations about the source code
      3 = Adequate — correct labels, reasonable comment, but accepted the
          issue at face value without critically examining the code
      4 = Good — identified the correct root cause, noticed discrepancies
          between the issue description and the actual code
      5 = Excellent — all of the above plus identified secondary issues
          and proposed actionable fixes with test cases

      Use the triage_expectations field in the annotations as your rubric
      for what a strong triage should include. Score based on how many of
      those expectations the agent met.

      Respond with just a number 1-5.

  - name: required_labels
    description: All required labels from annotations.yaml must be present
    check: |
      import json
      state = json.loads(outputs["files"]["output/fixture-state.json"])
      actual = [l.lower() for l in state.get("labels", [])]
      required = outputs.get("annotations", {}).get("labels", {}).get("required", [])
      if not required:
          return True, "No required labels specified"
      missing = [l for l in required if l.lower() not in actual]
      if missing:
          return False, f"Missing labels: {missing} (actual: {actual})"
      return True, f"All required labels present: {required}"

  - name: forbidden_labels
    description: Labels listed in annotations.yaml forbidden list must NOT be present
    check: |
      import json
      state = json.loads(outputs["files"]["output/fixture-state.json"])
      actual = [l.lower() for l in state.get("labels", [])]
      forbidden = outputs.get("annotations", {}).get("labels", {}).get("forbidden", [])
      if not forbidden:
          return True, "No forbidden labels specified"
      present = [l for l in forbidden if l.lower() in actual]
      if present:
          return False, f"Forbidden labels present: {present} (actual: {actual})"
      return True, f"No forbidden labels found (checked: {forbidden})"

  - name: max_turns
    description: Agent must complete within the declared turn budget
    check: |
      import json
      raw = outputs["files"].get("output/metrics.json")
      if not raw:
          return False, "metrics.json not found"
      metrics = json.loads(raw)
      actual = metrics.get("num_turns")
      if actual is None:
          return False, "num_turns not present in metrics.json"
      limit = outputs.get("annotations", {}).get("max_turns")
      if limit is None:
          return False, "max_turns not declared in annotations.yaml"
      if int(actual) > int(limit):
          return False, f"Exceeded max_turns: {actual} > {limit}"
      return True, f"Turns OK: {actual} <= {limit}"

  - name: max_cost
    description: Agent must complete within the declared cost budget
    check: |
      import json
      raw = outputs["files"].get("output/metrics.json")
      if not raw:
          return False, "metrics.json not found"
      metrics = json.loads(raw)
      actual = metrics.get("total_cost_usd")
      if actual is None:
          return False, "total_cost_usd not present in metrics.json"
      limit = outputs.get("annotations", {}).get("max_cost_usd")
      if limit is None:
          return False, "max_cost_usd not declared in annotations.yaml"
      if float(actual) > float(limit):
          return False, f"Exceeded max_cost_usd: {actual} > {limit}"
      return True, f"Cost OK: {actual} <= {limit}"

# ---------------------------------------------------------------------------
# Thresholds
# ---------------------------------------------------------------------------
thresholds:
  triage_quality:
    # TODO: raise to 3.5 once the triage agent critically examines source
    # code instead of accepting issue descriptions at face value.
    min_mean: 2.5
  required_labels:
    min_pass_rate: 0.9
  forbidden_labels:
    min_pass_rate: 0.9
  max_turns:
    min_pass_rate: 1.0
  max_cost:
    min_pass_rate: 1.0
