<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fullsend</title>
        <style>
            :root {
                --docs-border: #ccc;
                --docs-surface: #fff;
                --docs-muted-bg: #f4f4f4;
                --docs-text: #24292f;
                --docs-link: #0969da;
                --docs-topbar-height: 2.75rem;
                color-scheme: light;
                font-family:
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    Ubuntu,
                    Cantarell,
                    "Noto Sans",
                    sans-serif;
                line-height: 1.5;
            }
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background: var(--docs-surface);
                color: var(--docs-text);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }
            .topbar {
                flex: 0 0 var(--docs-topbar-height);
                height: var(--docs-topbar-height);
                display: flex;
                align-items: center;
                padding: 0 0.75rem;
                border-bottom: 1px solid var(--docs-border);
                background: var(--docs-surface);
            }
            .topbar-brand {
                font-weight: 600;
                font-size: 0.95rem;
                color: var(--docs-text);
                text-decoration: none;
            }
            .main {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 3rem 1.5rem;
            }
            .hero {
                text-align: center;
                margin-bottom: 2.5rem;
            }
            .hero h1 {
                font-size: 2rem;
                font-weight: 700;
                color: var(--docs-text);
                margin-bottom: 0.5rem;
            }
            .hero p {
                font-size: 1rem;
                color: color-mix(in srgb, var(--docs-text) 65%, transparent);
                max-width: 440px;
            }
            .cards {
                display: flex;
                gap: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            .card {
                display: block;
                background: var(--docs-surface);
                border: 1px solid var(--docs-border);
                border-radius: 0.5rem;
                padding: 1.5rem;
                width: 220px;
                text-decoration: none;
                color: var(--docs-text);
                transition:
                    background 0.12s,
                    border-color 0.12s;
            }
            .card:hover {
                background: var(--docs-muted-bg);
                border-color: color-mix(
                    in srgb,
                    var(--docs-text) 30%,
                    transparent
                );
            }
            .card:focus-visible {
                outline: 2px solid var(--docs-link);
                outline-offset: 2px;
            }
            .card h2 {
                font-size: 0.95rem;
                font-weight: 600;
                margin-bottom: 0.35rem;
                color: var(--docs-link);
            }
            .card p {
                font-size: 0.85rem;
                color: color-mix(in srgb, var(--docs-text) 65%, transparent);
                line-height: 1.5;
            }
        </style>
    </head>
    <body>
        <header class="topbar">
            <span class="topbar-brand">Fullsend</span>
        </header>
        <main class="main">
            <div class="hero">
                <h1>Fullsend</h1>
                <p>Fully autonomous agentic development</p>
            </div>
            <div class="cards">
                <a class="card" href="/docs/">
                    <h2>Documentation</h2>
                    <p>
                        Design documents, architecture, and guides for users,
                        administrators and contributors
                    </p>
                </a>
                <a class="card" href="/graph.html">
                    <h2>Document Map</h2>
                    <p>
                        Interactive graph of how documents connect across the
                        project
                    </p>
                </a>
            </div>
        </main>
    </body>
</html>
