version: 2

git:
  # Ignore major-version floating tags (v0, v1, ...) so they don't
  # confuse GoReleaser's previous-tag detection for changelogs.
  ignore_tags:
    - v0
    - v1
    - v2

builds:
  - main: ./cmd/fullsend/
    binary: fullsend
    ldflags:
      - -s -w -X github.com/fullsend-ai/fullsend/internal/cli.version={{.Version}} -X github.com/fullsend-ai/fullsend/internal/cli.commitSHA={{.FullCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^Merge '
      - '^ci(\(.*\))?:'
      - '^docs(\(.*\))?:'
      - '^test(\(.*\))?:'
      - '^chore(\(.*\))?:'
      - '^build(\(.*\))?:'
  groups:
    - title: Features
      regexp: '^.*?feat(\([^)]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([^)]+\))??!?:.+$'
      order: 1
    - title: Refactoring
      regexp: '^.*?refactor(\([^)]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

release:
  github:
    owner: fullsend-ai
    name: fullsend
  name_template: "{{ .Tag }}{{ if and .TagSubject (ne .TagSubject .Tag) }}: {{ .TagSubject }}{{ end }}"
  prerelease: auto

announce:
  slack:
    enabled: true
    channel: "#forum-konflux-fullsend"
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
